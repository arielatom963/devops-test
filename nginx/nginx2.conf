server {
    listen 80;
    server_name nginx2;

    location = /app {
        proxy_pass http://app:8000;
        include /etc/nginx/proxy_headers.conf;
    }

    location = /to-nginx1 {
        proxy_pass http://nginx1/app;
        include /etc/nginx/proxy_headers.conf;
    }

    location = /to-nginx3 {
        proxy_pass http://nginx3/app;
        include /etc/nginx/proxy_headers.conf;
    }
}
