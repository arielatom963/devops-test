server {
    listen 80;
    server_name nginx1;

    location = /app {
        proxy_pass http://app:8000;
        include /etc/nginx/proxy_headers.conf;
    }

    location = /to-nginx2 {
        proxy_pass http://nginx2/app;
        include /etc/nginx/proxy_headers.conf;
    }

    location = /to-nginx3 {
        proxy_pass http://nginx3/app;
        include /etc/nginx/proxy_headers.conf;
    }

    location = /to-nginx2-nginx3 {
        proxy_pass http://nginx2/to-nginx3;
        include /etc/nginx/proxy_headers.conf;
    }
}
