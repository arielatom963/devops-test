services:
  app:
    build: ./app
    container_name: xff-app
    networks:
      proxy_net:
        ipv4_address: 172.28.0.10

  nginx1:
    image: nginx:1.27-alpine
    container_name: xff-nginx1
    depends_on:
      - app
    ports:
      - "8081:80"
    volumes:
      - ./nginx/00-xff.conf:/etc/nginx/conf.d/00-xff.conf:ro
      - ./nginx/snippets/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
      - ./nginx/nginx1.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      proxy_net:
        ipv4_address: 172.28.0.11

  nginx2:
    image: nginx:1.27-alpine
    container_name: xff-nginx2
    depends_on:
      - app
    ports:
      - "8082:80"
    volumes:
      - ./nginx/00-xff.conf:/etc/nginx/conf.d/00-xff.conf:ro
      - ./nginx/snippets/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
      - ./nginx/nginx2.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      proxy_net:
        ipv4_address: 172.28.0.12

  nginx3:
    image: nginx:1.27-alpine
    container_name: xff-nginx3
    depends_on:
      - app
    ports:
      - "8083:80"
    volumes:
      - ./nginx/00-xff.conf:/etc/nginx/conf.d/00-xff.conf:ro
      - ./nginx/snippets/proxy_headers.conf:/etc/nginx/proxy_headers.conf:ro
      - ./nginx/nginx3.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      proxy_net:
        ipv4_address: 172.28.0.13

networks:
  proxy_net:
    ipam:
      config:
        - subnet: 172.28.0.0/24
